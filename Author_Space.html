<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtEcho | 創作者空間</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="CSS/cloud.css">
    <style>
        .author-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .author-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #2c5e4f; /* ArtEcho 綠色 */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-family: 'Noto Serif TC', serif;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2c5e4f;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }
        .back-link:hover {
            opacity: 0.7;
            text-decoration: underline;
        }
    </style>
    <script src="js/authGuard.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header">
        <nav class="nav-wrap">
            <a class="brand" href="index.html"><span class="brand-dot"></span>ArtEcho</a>
            <div class="nav-links">
                <a class="nav-btn" href="index.html">主頁</a>
                <a class="nav-btn" href="Gallery.html">個人雲端藝術庫</a>
                <a class="nav-btn" href="Story.html">劇情繪畫</a>
                <a class="nav-btn" href="Cloud_space.html">公開藝術畫廊</a>
                <a class="nav-btn" href="login.html">登入</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="panel reveal delay-1">
            <a href="Cloud_space.html" class="back-link">← 返回雲端畫廊</a>

            <div class="author-header">
                <div class="author-avatar" id="authorAvatar">作</div>
                <div>
                    <h1 class="page-title" id="authorNameTitle" style="margin-bottom: 5px;">創作者空間</h1>
                    <p class="page-subtitle" id="authorSubtitle">正在載入創作者的作品...</p>
                </div>
            </div>

            <div id="authorWorksGrid" class="cloud-grid" aria-live="polite">
            </div>
        </section>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. 從網址抓取作者名稱 (例如: AuthorSpace.html?author=藝術愛好者)
        const urlParams = new URLSearchParams(window.location.search);
        const authorName = urlParams.get('author');

        const titleEl = document.getElementById('authorNameTitle');
        const subtitleEl = document.getElementById('authorSubtitle');
        const avatarEl = document.getElementById('authorAvatar');

        if (authorName) {
            // 更新頁面上的作者資訊
            titleEl.textContent = authorName;
            subtitleEl.textContent = `探索 ${authorName} 的所有靈感與情緒瞬間。`;
            avatarEl.textContent = authorName.charAt(0); // 取名字的第一個字當大頭貼
            document.title = `ArtEcho | ${authorName} 的空間`;

            // 2. 這裡你需要加入向後端 API 請求該作者畫作的邏輯
            // fetch(`/api/works?author=${encodeURIComponent(authorName)}`).then(...)
            // 然後將結果渲染到 document.getElementById('authorWorksGrid') 中
        } else {
            titleEl.textContent = '找不到創作者';
            subtitleEl.textContent = '請從雲端畫廊重新選擇創作者。';
        }
    });
</script>
</body>
</html>
