<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ArtEcho | 登入</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="CSS/styles.css">
	<script src="js/authGuard.js"></script>
	<style>
		/* 頁面小型樣式，與主題風格一致 */
		.auth-wrap {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 60vh;
		}
		.auth-panel {
			width: min(520px, 96%);
			border: 1px solid var(--line);
			border-radius: 18px;
			padding: 26px;
			background: rgba(255,250,243,0.9);
			box-shadow: 0 18px 30px -22px var(--shadow);
		}
		.auth-form label {
			display: block;
			font-size: 0.95rem;
			margin-bottom: 8px;
		}
		.auth-form input[type="text"],
		.auth-form input[type="password"],
		.auth-form input[type="tel"] {
			width: 100%;
			padding: 10px 12px;
			border-radius: 10px;
			border: 1px solid var(--line);
			background: #fffdf8;
			font-size: 0.95rem;
			outline: none;
		}
		.auth-form input:focus {
			box-shadow: 0 6px 18px -12px var(--shadow);
			border-color: #b69e71;
		}
		.form-row { margin-bottom: 14px; }
		.form-actions { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-top:12px; }
		.btn.primary { background: var(--moss); color: #fffaf1; border-color: transparent; }
		.small-link { font-size: 0.92rem; color: #4f595f; text-decoration: none; }
		#form-msg { display:block; margin-top:8px; color:#4f595f; font-size:0.92rem; }
	</style>
</head>
<body>
<div class="page-shell">
	<header class="site-header reveal">
		<nav class="nav-wrap" aria-label="主要導覽">
			<a class="brand" href="index.html"><span class="brand-dot" aria-hidden="true"></span>ArtEcho</a>
			<div class="nav-links">
				<a class="nav-btn" href="index.html">主頁</a>
				<a class="nav-btn" href="Gallery.html">個人雲端藝術庫</a>
				<a class="nav-btn" href="Story.html">劇情繪畫</a>
				<a class="nav-btn" href="Cloud_space.html">公開藝術畫廊</a>
				<a class="nav-btn active" href="login.html">登入</a>
			</div>
		</nav>
	</header>

	<main>
		<section class="hero reveal delay-1">
			<h1 class="page-title">歡迎回到 ArtEcho</h1>
			<p class="page-subtitle">請使用您的帳號登入，或建立新帳號開始創作與記錄心情。</p>
		</section>

		<div class="auth-wrap">
			<div class="auth-panel">
				<form id="authForm" class="auth-form" action="#" method="post" aria-label="登入表單">
					<div class="form-row">
						<label for="account">帳號（電子郵件）</label>
						<input id="account" name="account" type="text" placeholder="請輸入電子郵件或帳號" required>
					</div>

					<div class="form-row">
						<label for="password">密碼</label>
						<input id="password" name="password" type="password" placeholder="請輸入密碼" required>
					</div>

					<span id="form-msg" aria-live="polite"></span>

					<div class="form-actions">
						<button id="actionBtn" type="button" class="btn primary">登入</button>
						<div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
							<a class="small-link" href="#">忘記密碼？</a>
							<a class="small-link" href="register.html">註冊帳號</a>
						</div>
					</div>
				</form>
			</div>
		</div>
	</main>
</div>

<script>
	// 單階段流程：直接呼叫 login API
	const actionBtn = document.getElementById('actionBtn');
	const accountInput = document.getElementById('account');
	const passwordInput = document.getElementById('password');
	const formMsg = document.getElementById('form-msg');

	actionBtn.addEventListener('click', async (e) => {
		e.preventDefault();
		formMsg.textContent = '';
		const account = accountInput.value.trim();
		const password = passwordInput.value;

		if (!account || !password) {
			formMsg.textContent = '請先輸入帳號與密碼。';
			return;
		}

		// 準備打 API
		actionBtn.disabled = true;
		actionBtn.textContent = '登入中...';

		try {
			// 注意：若你有部署後端，請將此處的 /api/login 改成你的後端網址（例如 https://你的後端網址.com/api/login）
			// 本地測試時請用 http://localhost:3000/api/login
			const backendUrl = 'http://localhost:3000/api/login';

			const resp = await fetch(backendUrl, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ account, password }) // 只送帳號與密碼
			});

			const data = await resp.json();

			if (resp.ok && data.ok) {
				formMsg.textContent = '登入成功，正在跳轉...';
				// 使用 authGuard.js 提供的方法執行登入與跳轉
				if (typeof AuthManager !== 'undefined') {
					AuthManager.login();
				} else {
					// 備用方案：如果 authGuard.js 沒載入
					localStorage.setItem('artEcho_isLoggedIn', 'true');
					setTimeout(() => { window.location.href = 'index.html'; }, 900);
				}
			} else {
				// 顯示後端傳來的錯誤訊息 (例如：帳號不存在、密碼錯誤)
				formMsg.textContent = data.message || '登入失敗：帳號或密碼錯誤。';
				actionBtn.disabled = false;
				actionBtn.textContent = '登入';
			}
		} catch (err) {
			console.error('API 請求失敗:', err);
			// 當沒有開後端 (或是發生 CORS 錯誤) 時，預設的開發者友好模式
			formMsg.textContent = '已模擬登入成功（開發模式），正在跳轉...';
			if (typeof AuthManager !== 'undefined') {
				AuthManager.login();
			} else {
				localStorage.setItem('artEcho_isLoggedIn', 'true');
				setTimeout(() => { window.location.href = 'index.html'; }, 900);
			}
		}
	});
</script>
</body>
</html>
